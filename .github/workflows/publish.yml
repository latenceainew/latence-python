name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      wheel_build_tag:
        description: "Optional same-version wheel build tag, e.g. 1 for latence-0.1.2-1-py3-none-any.whl"
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/latence
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: python -m build

    - name: Retag wheel for same-version refresh
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.wheel_build_tag != '' }}
      run: |
        pip install wheel
        python -m wheel tags --remove --build "${{ inputs.wheel_build_tag }}" dist/*.whl

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        skip-existing: true
